    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fa-solid fa-leaf"></i> Agro<span>Sustentável</span>

    <section class="contact pag-interna">
        <div class="contact-container">
            <h2>Fale Conosco</h2>
            <p>Tem dúvidas sobre como migrar sua produção para o modelo sustentável? Mande uma mensagem.</p>
            
            <form id="agro-form">
                <input type="text" id="nome" placeholder="Seu Nome" required>
                <input type="email" id="email" placeholder="Seu E-mail" required>
                <textarea id="mensagem" placeholder="Como podemos ajudar sua lavoura?" rows="5" required></textarea>
                <button type="submit">Enviar Mensagem</button>
            </form>
            <div id="form-mensagem" class="hidden"></div>
        </div>
    </section>
